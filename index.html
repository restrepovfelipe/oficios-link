<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oficios LINK — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f1117; --bg2:#181b24; --bg3:#1e2130;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#f0f2f7; --text2:#9aa0b4; --text3:#5c6278;
  --blue:#3b82f6; --red:#ef4444; --amber:#f59e0b; --green:#22c55e;
  --purple:#8b5cf6; --orange:#f97316; --teal:#14b8a6;
  --radius:10px; --radius-lg:14px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; font-size:14px; min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--bg2); border-bottom:0.5px solid var(--border); padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-size:17px; font-weight:600; color:var(--text); letter-spacing:-0.3px; }
.logo span { color:var(--blue); }
.topbar-right { display:flex; align-items:center; gap:12px; }
.badge-live { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--green); background:rgba(34,197,94,0.12); padding:4px 10px; border-radius:20px; }
.badge-live::before { content:''; width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.last-sync { font-size:12px; color:var(--text3); }
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); font-size:12px; cursor:pointer; transition:background 0.15s,color 0.15s; white-space:nowrap; }
.btn:hover { background:var(--bg3); color:var(--text); }
.btn:disabled { opacity:0.4; pointer-events:none; }
.btn svg { width:13px; height:13px; flex-shrink:0; }
.btn.spinning svg { animation:spin 0.8s linear infinite; }
.btn-red { border-color:rgba(239,68,68,0.4); color:#ef4444; } .btn-red:hover { background:rgba(239,68,68,0.1); color:#ef4444; }
.btn-amber { border-color:rgba(245,158,11,0.4); color:#f59e0b; } .btn-amber:hover { background:rgba(245,158,11,0.1); color:#f59e0b; }
.btn-purple { border-color:rgba(139,92,246,0.4); color:#8b5cf6; } .btn-purple:hover { background:rgba(139,92,246,0.1); color:#8b5cf6; }
@keyframes spin { to { transform:rotate(360deg); } }

.container { max-width:1400px; margin:0 auto; padding:1.75rem 2rem; }
.section-title { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; margin:1.75rem 0 0.75rem; }
.section-title:first-child { margin-top:0; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin:1.75rem 0 0.75rem; }
.section-header .section-title { margin:0; }

.metrics { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
.metric { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; }
.metric-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
.metric-value { font-size:28px; font-weight:600; line-height:1; color:var(--text); letter-spacing:-1px; }
.metric-value.red{color:var(--red);} .metric-value.amber{color:var(--amber);} .metric-value.green{color:var(--green);} .metric-value.blue{color:var(--blue);} .metric-value.orange{color:var(--orange);}
.metric-sub { font-size:11px; color:var(--text3); margin-top:5px; }

.resp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.resp-card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; }
.resp-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1rem; padding-bottom:1rem; border-bottom:0.5px solid var(--border); }
.resp-name { font-size:15px; font-weight:600; color:var(--text); }
.resp-eff { font-size:24px; font-weight:700; line-height:1; }
.resp-eff-label { font-size:10px; color:var(--text3); text-align:right; margin-top:2px; }
.block-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; padding:3px 8px; border-radius:5px; display:inline-block; }
.block-propio { color:var(--blue); background:rgba(59,130,246,0.1); }
.block-seguimiento { color:var(--purple); background:rgba(139,92,246,0.1); }
.mini-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:8px; }
.mini-stat { background:var(--bg3); border-radius:7px; padding:0.5rem 0.6rem; }
.mini-stat-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:3px; }
.mini-stat-value { font-size:15px; font-weight:600; color:var(--text); line-height:1; }
.mini-stat-value.red{color:var(--red);} .mini-stat-value.amber{color:var(--amber);} .mini-stat-value.green{color:var(--green);} .mini-stat-value.orange{color:var(--orange);}
.progress-bar { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; margin-top:0.5rem; }
.progress-fill { height:100%; border-radius:3px; }
.email-btns { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }

.toggle-group { display:flex; gap:4px; background:var(--bg3); border-radius:8px; padding:3px; }
.toggle-btn { padding:4px 12px; border-radius:6px; border:none; background:transparent; color:var(--text3); font-size:12px; cursor:pointer; transition:background 0.15s,color 0.15s; }
.toggle-btn.active { background:var(--bg2); color:var(--text); border:0.5px solid var(--border2); }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.card { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; }
.card-title { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:1rem; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.bar-row:last-child { margin-bottom:0; }
.bar-name { font-size:12px; color:var(--text2); width:130px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-track { flex:1; height:20px; background:var(--bg3); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; }
.bar-count { font-size:12px; color:var(--text2); min-width:32px; text-align:right; font-variant-numeric:tabular-nums; }

.pill { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 10px; border-radius:20px; margin:2px; font-weight:500; }
.summary-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:0.5px solid var(--border); font-size:12px; color:var(--text2); }
.summary-row:last-child { border-bottom:none; }
.estado-pills { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:1rem; }

.period-box { background:var(--bg2); border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; }
.period-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:0.5px solid var(--border); }
.period-row:last-child { border-bottom:none; }
.period-name { font-size:13px; color:var(--text2); }
.period-count { font-size:20px; font-weight:700; }

/* TABLA */
.tabla-vencidos { width:100%; border-collapse:collapse; font-size:12px; }
.tabla-vencidos th { text-align:left; color:var(--text3); font-weight:600; padding:0 8px 10px 0; border-bottom:0.5px solid var(--border2); font-size:10px; text-transform:uppercase; letter-spacing:0.05em; }
.tabla-vencidos td { padding:9px 8px 9px 0; border-bottom:0.5px solid var(--border); color:var(--text2); vertical-align:middle; }
.tabla-vencidos tr:last-child td { border-bottom:none; }
.tabla-vencidos tr:hover td { color:var(--text); }
.badge-vencido { display:inline-block; background:rgba(239,68,68,0.15); color:#ef4444; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
.tabla-scroll { max-height:420px; overflow-y:auto; }
.tabla-scroll::-webkit-scrollbar { width:4px; }
.tabla-scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.search-input { width:100%; background:var(--bg3); border:0.5px solid var(--border2); border-radius:var(--radius); padding:7px 12px; color:var(--text); font-size:13px; margin-bottom:12px; outline:none; }
.search-input::placeholder { color:var(--text3); }
.search-input:focus { border-color:var(--blue); }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); width:100%; max-width:640px; max-height:90vh; display:flex; flex-direction:column; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:0.5px solid var(--border); }
.modal-title { font-size:15px; font-weight:600; color:var(--text); }
.modal-close { background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; line-height:1; padding:2px 6px; border-radius:4px; }
.modal-close:hover { background:var(--bg3); color:var(--text); }
.modal-body { padding:1.25rem 1.5rem; overflow-y:auto; flex:1; }
.modal-footer { padding:1rem 1.5rem; border-top:0.5px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
.modal-lista { background:var(--bg3); border-radius:var(--radius); padding:1rem; font-size:12px; color:var(--text2); white-space:pre-wrap; font-family:monospace; line-height:1.7; max-height:320px; overflow-y:auto; margin-bottom:1rem; }
.modal-lista::-webkit-scrollbar { width:4px; }
.modal-lista::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.modal-info { font-size:12px; color:var(--text3); margin-bottom:12px; line-height:1.6; }
.btn-copy { background:var(--bg3); border:0.5px solid var(--border2); color:var(--text2); padding:8px 16px; border-radius:var(--radius); font-size:13px; cursor:pointer; transition:background 0.15s; }
.btn-copy:hover { background:var(--border2); color:var(--text); }
.btn-gmail { background:var(--blue); border:none; color:#fff; padding:8px 18px; border-radius:var(--radius); font-size:13px; cursor:pointer; font-weight:500; transition:opacity 0.15s; }
.btn-gmail:hover { opacity:0.88; }

.state-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:12px; color:var(--text3); font-size:14px; }
.spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }

@media (max-width:1100px) { .metrics { grid-template-columns:repeat(3,1fr); } }
@media (max-width:900px) { .grid2,.resp-grid { grid-template-columns:1fr; } }
@media (max-width:600px) { .metrics { grid-template-columns:1fr 1fr; } .container { padding:1rem; } .topbar { padding:0 1rem; } .mini-stats { grid-template-columns:repeat(3,1fr); } }

/* LOGIN */
.login-overlay { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--bg2); border:0.5px solid var(--border2); border-radius:var(--radius-lg); padding:2.5rem 2rem; width:100%; max-width:360px; text-align:center; }
.login-logo { font-size:22px; font-weight:700; color:var(--text); margin-bottom:4px; }
.login-logo span { color:var(--blue); }
.login-sub { font-size:13px; color:var(--text3); margin-bottom:2rem; }
.login-input { width:100%; background:var(--bg3); border:0.5px solid var(--border2); border-radius:var(--radius); padding:10px 14px; color:var(--text); font-size:14px; outline:none; text-align:center; letter-spacing:0.1em; margin-bottom:10px; }
.login-input:focus { border-color:var(--blue); }
.login-btn { width:100%; padding:10px; background:var(--blue); border:none; border-radius:var(--radius); color:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
.login-btn:hover { opacity:0.88; }
.login-error { font-size:12px; color:var(--red); margin-top:8px; min-height:18px; }
.login-lock { font-size:36px; margin-bottom:1rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-lock">🔐</div>
    <div class="login-logo">Oficios <span>LINK</span></div>
    <div class="login-sub">Panel de seguimiento — Acceso restringido</div>
    <input class="login-input" type="password" id="loginInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')verificarClave()">
    <button class="login-btn" onclick="verificarClave()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Lista</div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-lista" id="modalLista"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-copy" onclick="copiarLista()" id="btnCopy">📋 Copiar lista</button>
      <button class="btn-gmail" onclick="abrirGmailModal()" id="btnGmail">✉️ Abrir Gmail</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="logo">Oficios <span>LINK</span></div>
  <div class="topbar-right">
    <span class="badge-live">En vivo</span>
    <span class="last-sync" id="lastSync"></span>
    <button class="btn" id="syncBtn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      Actualizar
    </button>
  </div>
</div>

<div class="container">
  <div id="root">
    <div class="state-center">
      <div class="spinner"></div>
      <div>Conectando con Google Sheets...</div>
      <div style="font-size:12px;color:var(--text3)">Esto puede tomar hasta 45 segundos la primera vez</div>
    </div>
  </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbxZfkH2pdvaaU3FegFNswCb-mvQdnD7ocReyljvq5oFDEFgF48t0FGgn4Gjo6Lq37tL/exec';
const PALETTE=['#3b82f6','#22c55e','#f97316','#ec4899','#f59e0b','#8b5cf6','#14b8a6','#ef4444'];
const CORREOS={ admin:'juridica3.equipoandrestobon@gmail.com', 'Johnatan Tobón':'gestion.equipoandrestobon@gmail.com', 'Emiliana García':'juridica4.equipoandrestobon@gmail.com' };
const RESPONSABLES={
  'Johnatan Tobón':{ color:'#3b82f6', propios:['johnatan tobón','johnatan tobon'], seguimiento:['felipe restrepo'] },
  'Emiliana García':{ color:'#22c55e', propios:['emiliana garcía','emiliana garcia'], seguimiento:['juan manuel sierra'] }
};

let charts={}, allRows=[], currentPeriod='semana', radicadosVencidosData=[];
let modalGmailData={ to:'', subject:'' };

function destroyAll(){ Object.values(charts).forEach(function(c){if(c)c.destroy();}); charts={}; }
function norm(v){ return (v||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function getField(r, keyword, exact) {
  // Busca columna por palabra clave, ignorando tildes/mayúsculas
  var keys=Object.keys(r);
  for(var i=0;i<keys.length;i++){
    var nk=norm(keys[i]);
    var match=exact ? nk===keyword : nk.indexOf(keyword)!==-1;
    if(match){
      var v=(r[keys[i]]||'').toString().trim();
      if(v) return v;
    }
  }
  return '';
}

function isSolucionado(r){ var e=norm(r['ESTADO DEL TRÁMITE']||''); return e==='respuesta completa'||e==='respuesta parcial'; }
function isIncompleto(r){ return norm(r['ESTADO DEL TRÁMITE']||'')==='respuesta incompleta'; }
function isVencido(v){ return norm(v)==='vencido'; }
function isNoContactado(r){ return norm(r['ESTADO DEL TRÁMITE']||'')==='no contactado'; }
function isRadicadoVencido(r){ return norm(r['ESTADO DEL TRÁMITE']||'')==='oficio radicado'&&isVencido(r['¿SE ENCUENTRA VENCIDO?']||''); }

function parseDate(v){
  if(!v) return null; var s=v.toString().trim();
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(iso) return new Date(+iso[1],+iso[2]-1,+iso[3]);
  var sl=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(sl) return new Date(+sl[3],+sl[2]-1,+sl[1]);
  return null;
}
function startOfDay(d){var r=new Date(d);r.setHours(0,0,0,0);return r;}
function startOfWeek(d){var day=d.getDay(),diff=(day===0)?-6:1-day,r=new Date(d);r.setDate(d.getDate()+diff);r.setHours(0,0,0,0);return r;}
function startOfMonth(d){return new Date(d.getFullYear(),d.getMonth(),1);}
function titleCase(s){return s.split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');}

function getRespType(row){
  var r=norm(row['RESPONSABLE']||'');
  for(var nombre in RESPONSABLES){
    var cfg=RESPONSABLES[nombre];
    if(cfg.propios.indexOf(r)!==-1) return {resp:nombre,tipo:'propio'};
    if(cfg.seguimiento.indexOf(r)!==-1) return {resp:nombre,tipo:'seguimiento'};
  }
  return {resp:null,tipo:null};
}

// ── MODAL ──────────────────────────────────────────────────────────────
function abrirModal(title, info, lista, gmailTo, gmailSubject){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInfo').textContent=info;
  document.getElementById('modalLista').textContent=lista;
  modalGmailData={ to:gmailTo, subject:gmailSubject, lista:lista };
  document.getElementById('modalOverlay').classList.add('open');
}
function cerrarModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function copiarLista(){
  var el=document.getElementById('modalLista');
  navigator.clipboard.writeText(el.textContent).then(function(){
    var btn=document.getElementById('btnCopy');
    btn.textContent='✅ Copiado'; setTimeout(function(){btn.textContent='📋 Copiar lista';},2000);
  });
}
function abrirGmailModal(){
  // Abre Gmail con asunto y cuerpo base (sin lista para evitar límite URL)
  // La lista ya está en el modal para que el usuario la pegue
  var body='Hola,\n\nPor favor revisa la lista adjunta y toma acción a la brevedad.\n\nAndres Tobón\nEquipo Jurídico';
  var url='https://mail.google.com/mail/?view=cm&fs=1'
    +'&to='+encodeURIComponent(modalGmailData.to)
    +'&su='+encodeURIComponent(modalGmailData.subject)
    +'&body='+encodeURIComponent(body);
  window.open(url,'_blank');
  // Mostrar instrucción
  document.getElementById('modalInfo').textContent='✅ Gmail abierto. Pega la lista copiada en el cuerpo del correo y envíalo.';
}

// ── EMAILS VIA MODAL ────────────────────────────────────────────────────
function emailNoContactados(nombre){
  var rows=allRows.filter(function(r){ var rt=getRespType(r); return rt.resp===nombre&&isNoContactado(r); });
  if(!rows.length){alert('No hay denunciantes sin contactar para '+nombre+'.');return;}
  var lista=rows.map(function(r,i){
    var tel=(r['NÚMERO DE TELÉFONO / CORREO ELECTÓNICO']||'').toString().trim()||'Sin dato';
    var asunto=getField(r,'asunto')||getField(r,'denuncia',true)||'Sin dato';
    return (i+1)+'. '+( r['NOMBRE DEL DENUNCIANTE']||'—')+'\n   Asunto: '+asunto+'\n   Contacto: '+tel;
  }).join('\n\n');
  var subject='Seguimiento urgente — Denunciantes sin contactar ('+rows.length+')';
  var info='Copia esta lista y pégala en el correo de Gmail. Se abrirá pre-direccionado a '+nombre+'.';
  abrirModal('No contactados — '+nombre, info, lista, CORREOS[nombre], subject);
}

function emailSeguimientosPendientes(nombre){
  var rows=allRows.filter(function(r){ var rt=getRespType(r); var seg=norm(r['CONTACTO DE SEGUIMIENTO CON EL DENUNCIANTE']||''); return rt.resp===nombre&&seg.indexOf('no contactado')!==-1; });
  if(!rows.length){alert('No hay seguimientos pendientes para '+nombre+'.');return;}
  var lista=rows.map(function(r,i){
    var tel=(r['NÚMERO DE TELÉFONO / CORREO ELECTÓNICO']||'').toString().trim()||'Sin dato';
    var rad=(r['RADICADO (CONCEJO) DEL OFICIO']||r['RADICADO (ALCALDÍA) DEL OFICIO']||'—').toString().trim();
    var asunto=getField(r,'asunto')||'Sin asunto registrado';
    return (i+1)+'. '+(r['NOMBRE DEL DENUNCIANTE']||'—')+'\n   Asunto: '+asunto+'\n   Radicado: '+rad+'\n   Contacto: '+tel;
  }).join('\n\n');

// ── STATS ───────────────────────────────────────────────────────────────
function computeStats(rows){
  var stats={};
  for(var nombre in RESPONSABLES){
    stats[nombre]={
      propio:     {total:0,solucionados:0,noContactados:0,vencidos:0,incompletos:0,segContactado:0,segNoContactado:0},
      seguimiento:{total:0,solucionados:0,noContactados:0,vencidos:0,incompletos:0,segContactado:0,segNoContactado:0}
    };
  }
  rows.forEach(function(r){
    var rt=getRespType(r); if(!rt.resp) return;
    var b=stats[rt.resp][rt.tipo];
    b.total++;
    if(isSolucionado(r)) b.solucionados++;
    if(isIncompleto(r)) b.incompletos++;
    if(isNoContactado(r)) b.noContactados++;
    if(isVencido(r['¿SE ENCUENTRA VENCIDO?']||'')) b.vencidos++;
    var seg=norm(r['CONTACTO DE SEGUIMIENTO CON EL DENUNCIANTE']||'');
    if(seg==='contactado nuevamente') b.segContactado++;
    else if(seg.indexOf('no contactado')!==-1) b.segNoContactado++;
  });
  return stats;
}

function groupBy(rows,key,top){
  top=top||7; var m={};
  rows.forEach(function(r){var k=(r[key]||'').toString().trim()||'Sin asignar';m[k]=(m[k]||0)+1;});
  return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,top);
}

function byMonth(rows,key){
  var m={};
  rows.forEach(function(r){
    var d=parseDate(r[key]); if(!d) return;
    var ym=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    m[ym]=(m[ym]||0)+1;
  });
  return Object.entries(m).sort(function(a,b){return a[0].localeCompare(b[0]);});
}

function bars(items,max){
  if(!items.length) return '<div style="color:#5c6278;font-size:13px;padding:0.5rem 0">Sin datos</div>';
  return items.map(function(item,i){
    var pct=Math.round(item[1]/max*100);
    return '<div class="bar-row"><div class="bar-name" title="'+item[0]+'">'+item[0]+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+PALETTE[i%PALETTE.length]+'"></div></div>'
      +'<div class="bar-count">'+item[1]+'</div></div>';
  }).join('');
}

function countPeriod(rows,period){
  var now=new Date();
  var desde=period==='dia'?startOfDay(now):period==='semana'?startOfWeek(now):startOfMonth(now);
  var result={};
  for(var n in RESPONSABLES) result[n]={propio:0,seguimiento:0};
  rows.forEach(function(r){
    var d=parseDate(r['FECHA RADICACIÓN']); if(!d||d<desde) return;
    var rt=getRespType(r); if(rt.resp) result[rt.resp][rt.tipo]++;
  });
  return result;
}

          +'<div class="mini-stat"><div class="mini-stat-label">Contactados</div><div class="mini-stat-value green">'+b.segContactado+'</div></div>'
          +'<div class="mini-stat"><div class="mini-stat-label">Pendientes</div><div class="mini-stat-value '+(b.segNoContactado>0?'amber':'')+'">'+b.segNoContactado+'</div></div>'
          +'<div class="mini-stat"><div class="mini-stat-label">Tasa</div><div class="mini-stat-value" style="color:'+tc+'">'+tasa+'%</div></div>'
        +'</div>'
        +'<div class="progress-bar"><div class="progress-fill" style="width:'+tasa+'%;background:'+tc+'"></div></div>'
      +'</div>';
    }

    html+='<div class="resp-card">'
      +'<div class="resp-header"><div><div class="resp-name">'+nombre2+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">Tasa global: <strong style="color:'+tasaColor2+'">'+totTasa+'%</strong></div></div>'
        +'<div style="text-align:right"><div style="font-size:11px;color:var(--text3)">Pendientes</div><div style="font-size:24px;font-weight:700;color:'+(totP>0?'#f59e0b':'#22c55e')+';line-height:1">'+totP+'</div></div>'
      +'</div>'
      +segBloque('Propios','block-propio',s2.propio)
      +segBloque('Seguimiento · '+predNombre2,'block-seguimiento',s2.seguimiento)
    +'</div>';
  }
  html+='</div>';

  // PANEL ADMIN
  html+='<div class="section-header"><div class="section-title">⚠️ Panel administrador — Oficios radicados vencidos ('+radicadosVencidosData.length+')</div></div>';
  html+='<div class="card" style="margin-bottom:12px"><div id="tablaVencidosWrap"><div style="color:var(--text3);font-size:13px">Cargando...</div></div></div>';

  // ANÁLISIS GENERAL
  html+='<div class="section-title">Análisis general</div>';
  html+='<div class="grid2" style="margin-bottom:12px">'
    +'<div class="card"><div class="card-title">Oficios por responsable</div>'+bars(porResp,porResp[0]?porResp[0][1]:1)+'</div>'
    +'<div class="card"><div class="card-title">Estado del trámite</div>'+bars(porEstado,porEstado[0]?porEstado[0][1]:1)+'</div>'
  +'</div>';
  html+='<div class="grid2" style="margin-bottom:12px">'
    +'<div class="card"><div class="card-title">Radicados por mes</div><div style="position:relative;width:100%;height:'+mesH+'px"><canvas id="cMes"></canvas></div></div>'
    +'<div class="card"><div class="card-title">Por entidad de destino</div>'+bars(porEntidad,porEntidad[0]?porEntidad[0][1]:1)+'</div>'
  +'</div>';
  html+='<div class="grid2">'
    +'<div class="card"><div class="card-title">Por comuna</div>'+bars(porComuna,porComuna[0]?porComuna[0][1]:1)+'</div>'
    +'<div class="card"><div class="card-title">Resumen estados</div>'
      +'<div class="estado-pills">'+porEstado.map(function(item,i){return '<span class="pill" style="background:'+PALETTE[i%PALETTE.length]+'22;color:'+PALETTE[i%PALETTE.length]+'">'+item[0]+' <strong>'+item[1]+'</strong></span>';}).join('')+'</div>'
      +'<div>'
        +'<div class="summary-row"><span>Vencidos</span><span class="pill" style="background:rgba(239,68,68,0.15);color:#ef4444"><strong>'+vencidos+'</strong> / '+total+'</span></div>'
        +'<div class="summary-row"><span>No contactados</span><span class="pill" style="background:rgba(245,158,11,0.15);color:#f59e0b"><strong>'+noContactados+'</strong> / '+total+'</span></div>'
        +'<div class="summary-row"><span>Resp. incompleta</span><span class="pill" style="background:rgba(249,115,22,0.15);color:#f97316"><strong>'+incompletos+'</strong> / '+total+'</span></div>'
        +'<div class="summary-row"><span>Solucionados</span><span class="pill" style="background:rgba(34,197,94,0.15);color:#22c55e"><strong>'+solucionados+'</strong> / '+total+'</span></div>'
      +'</div>'
    +'</div>'
  +'</div>';

  document.getElementById('root').innerHTML=html;
  renderPeriod(rows);
  renderTablaVencidos(radicadosVencidosData);

  if(meses.length){
    var ctx=document.getElementById('cMes');
    if(ctx){
      charts.mes=new Chart(ctx,{
        type:'bar',
        data:{labels:meses.map(function(m){return m[0];}),datasets:[{label:'Radicados',data:meses.map(function(m){return m[1];}),backgroundColor:'#3b82f6',borderRadius:4}]},
        options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
          scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#5c6278',font:{size:11}}},y:{grid:{display:false},ticks:{color:'#9aa0b4',font:{size:11},autoSkip:false}}}}
      });
    }
  }
}

// ── LOGIN ────────────────────────────────────────────────────────────────
var PASS_HASH = '9f4b7c2e1a3d6f8e5b0c4a7d2f9e1b3c'; // hash visual, no seguridad real
var CLAVE = 'Admin.2026*';
var SESSION_KEY = 'oficios_auth';

function verificarClave(){
  var input = document.getElementById('loginInput').value;
  var errorEl = document.getElementById('loginError');
  if(input === CLAVE){
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  } else {
    errorEl.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
    setTimeout(function(){ errorEl.textContent = ''; }, 3000);
  }
}

function checkAuth(){
  if(sessionStorage.getItem(SESSION_KEY) === '1'){
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  } else {
    setTimeout(function(){
      document.getElementById('loginInput').focus();
    }, 100);
  }
}

function loadData(){
  var btn=document.getElementById('syncBtn');
  btn.disabled=true; btn.classList.add('spinning');
  document.getElementById('root').innerHTML='<div class="state-center"><div class="spinner"></div><div>Conectando con Google Sheets...</div><div style="font-size:12px;color:var(--text3)">Esto puede tomar hasta 45 segundos la primera vez</div></div>';
  var cbName='cb_'+Date.now(), script=document.createElement('script');
  var timeout=setTimeout(function(){cleanup();showError('Tiempo de espera agotado. Reintenta.');},45000);
  function cleanup(){try{delete window[cbName];}catch(e){}if(script.parentNode)script.parentNode.removeChild(script);clearTimeout(timeout);btn.disabled=false;btn.classList.remove('spinning');}
  window[cbName]=function(json){
    cleanup();
    try{
      if(!json||!json.ok) throw new Error('Respuesta inválida');
      var rows=json.data||[]; if(!rows.length) throw new Error('La hoja no tiene datos');
      allRows=rows; render(rows);
      document.getElementById('lastSync').textContent='Actualizado '+new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    }catch(e){showError(e.message);}
  };
  script.onerror=function(){cleanup();showError('No se pudo conectar. Verifica tu conexión.');};
  script.src=API_URL+'?callback='+cbName+'&t='+Date.now();
  document.head.appendChild(script);
}

function showError(msg){
  document.getElementById('root').innerHTML='<div class="state-center"><div style="font-size:32px">⚠️</div><div style="font-weight:600;color:#f0f2f7;font-size:15px">No se pudo cargar</div><div style="max-width:400px;text-align:center;line-height:1.6">'+msg+'</div><button onclick="loadData()" style="margin-top:8px;padding:8px 22px;cursor:pointer;border-radius:10px;border:0.5px solid rgba(255,255,255,0.14);background:transparent;color:#9aa0b4;font-size:13px">Reintentar</button></div>';
}

checkAuth();
</script>
